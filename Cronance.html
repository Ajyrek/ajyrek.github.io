<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cronance - Menedżer Finansowy</title>

    <!-- Nowoczesny font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0b0f19;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --btn: #1f2937;
        --btnHover: #263244;
        --accent: #60a5fa;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 400px at 50% 20%, rgba(96,165,250,.20), transparent),
          radial-gradient(700px 350px at 20% 80%, rgba(167,139,250,.14), transparent),
          var(--bg);
      }

      .card {
        width: min(720px, 100%);
        background: rgba(17,24,39,0.85);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.45);
        backdrop-filter: blur(10px);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 3.2vw, 34px);
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .lang {
        display: inline-flex;
        gap: 10px;
        flex-shrink: 0;
      }

      .lang button {
        appearance: none;
        border: 1px solid rgba(255,255,255,0.10);
        background: var(--btn);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: transform .08s ease, background .2s ease, border-color .2s ease;
      }

      .lang button:hover { background: var(--btnHover); }
      .lang button:active { transform: translateY(1px); }

      .lang button[aria-pressed="true"] {
        border-color: rgba(96,165,250,0.55);
        box-shadow: 0 0 0 4px rgba(96,165,250,0.14);
      }

      .linkBox {
        margin-top: 22px;
        padding: 16px;
        border-radius: 14px;
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      a.store {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }

      a.store:hover { text-decoration: underline; }

      .small {
        color: var(--muted);
        font-size: 12px;
      }

      /* 🔧 KLUCZOWA POPRAWKA – mobile */
      @media (max-width: 640px) {
        .top {
          flex-direction: column;
          align-items: flex-start;
        }

        .lang {
          margin-top: 6px;
        }
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div class="top">
        <div>
          <h1 id="title">Cronance – Menedżer Finansowy</h1>
          <p class="subtitle" id="subtitle">Pobierz aplikację z Google Play.</p>
        </div>

        <div class="lang" role="group" aria-label="Wybór języka">
          <button type="button" data-lang="pl" aria-pressed="true">PL</button>
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
          <button type="button" data-lang="ua" aria-pressed="false">UA</button>
        </div>
      </div>

      <div class="linkBox">
        <a
          class="store"
          id="storeLink"
          href="https://play.google.com/store/apps/details?id=com.ajyr.green.cronance&hl=pl"
          target="_blank"
          rel="noopener noreferrer"
        >
          Otwórz w Google Play
        </a>
        <span class="small" id="hint">Link otworzy się w nowej karcie.</span>
      </div>
    </main>

    <script>
      const t = {
        pl: {
          title: "Cronance – Menedżer Finansowy",
          subtitle: "Pobierz aplikację z Google Play.",
          link: "Otwórz w Google Play",
          hint: "Link otworzy się w nowej karcie.",
          lang: "pl"
        },
        en: {
          title: "Cronance – Finance Manager",
          subtitle: "Get the app on Google Play.",
          link: "Open on Google Play",
          hint: "The link will open in a new tab.",
          lang: "en"
        },
        ua: {
          title: "Cronance — Фінансовий менеджер",
          subtitle: "Завантажте застосунок у Google Play.",
          link: "Відкрити в Google Play",
          hint: "Посилання відкриється в новій вкладці.",
          lang: "uk"
        }
      };

      const titleEl = document.getElementById("title");
      const subtitleEl = document.getElementById("subtitle");
      const linkEl = document.getElementById("storeLink");
      const hintEl = document.getElementById("hint");
      const buttons = document.querySelectorAll(".lang button");

      function setLang(lang) {
        const d = t[lang] || t.pl;
        titleEl.textContent = d.title;
        subtitleEl.textContent = d.subtitle;
        linkEl.textContent = d.link;
        hintEl.textContent = d.hint;
        document.documentElement.lang = d.lang;

        buttons.forEach(b =>
          b.setAttribute("aria-pressed", b.dataset.lang === lang)
        );

        localStorage.setItem("cronance_lang", lang);
      }

      buttons.forEach(b =>
        b.addEventListener("click", () => setLang(b.dataset.lang))
      );

      setLang(localStorage.getItem("cronance_lang") || "pl");
    </script>
  </body>
</html>
